<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>体重ログミニアプリ（公開確認用）</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header class="section">
        <h1>体重ログミニアプリ（公開確認用）</h1>
        <p>
          GitHub Pages でスマホ表示を確認するための、最小骨組みページです。
        </p>
      </header>

      <section class="section" aria-labelledby="input-title">
        <h2 id="input-title">今日の体重入力</h2>
        <form id="weight-form" class="form-grid">
          <label for="record-date">日付</label>
          <input id="record-date" name="record-date" type="date" required />

          <label for="weight-value">体重 (kg)</label>
          <input
            id="weight-value"
            name="weight-value"
            type="number"
            step="0.1"
            min="0"
            placeholder="例: 62.3"
            required
          />

          <div class="button-row">
            <button id="save-button" type="submit">保存</button>
            <button id="build-report-button" type="button">報告文作成</button>
          </div>
        </form>
      </section>

      <section class="section" aria-labelledby="records-title">
        <h2 id="records-title">記録一覧</h2>
        <ul id="records-list">
          <li class="empty-message">記録はまだありません。日付と体重を入力して保存してください。</li>
        </ul>
      </section>

      <section class="section" aria-labelledby="report-title">
        <h2 id="report-title">ChatGPT報告文</h2>
        <textarea
          id="report-output"
          rows="6"
          readonly
          placeholder="報告文はここに表示されます（Task 003 では仮の表示）。"
        ></textarea>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
